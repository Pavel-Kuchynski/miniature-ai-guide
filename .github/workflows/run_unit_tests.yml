name: PR Unit Tests

# First code-quality gate: run each backend module's unit test suite and the
# frontend test suite on every pull request targeting main. New backend/<module>/
# directories are picked up automatically as long as they contain a tests/
# folder — no workflow changes needed to extend coverage.
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  discover-modules:
    name: Discover backend modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find backend modules with tests
        id: find
        shell: bash
        run: |
          modules="[]"
          if [ -d backend ]; then
            modules=$(find backend -mindepth 1 -maxdepth 1 -type d -exec test -d '{}/tests' \; -print \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "modules=${modules}" >> "$GITHUB_OUTPUT"
          echo "Discovered modules: ${modules}"

  test:
    name: Run tests (${{ matrix.module }})
    needs: discover-modules
    if: needs.discover-modules.outputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover-modules.outputs.modules) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies for ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run unit tests for ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: python -m unittest discover -s tests

  frontend-test:
    name: Run frontend unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test
